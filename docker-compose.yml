services:
  db:
    image: postgres:16-alpine
    container_name: crm_postgres_db
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_secure_password
      POSTGRES_DB: crm_main_database
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./services/core
    container_name: crm_backend_core
    restart: always
    volumes:
      - ./services/core:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://crm_admin:crm_secure_password@db:5432/crm_main_database
    depends_on:
      - db

  logger:
    build: ./services/logger
    container_name: crm_logger_service
    restart: always
    volumes:
      - ./services/logger:/app
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  analyzer:
    build: ./services/analyzer
    container_name: crm_analyzer_service
    restart: always
    volumes:
      - ./services/analyzer:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://crm_admin:crm_secure_password@db:5432/crm_main_database
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build: ./frontend
    container_name: crm_frontend_react
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  gateway:
    image: nginx:alpine
    container_name: crm_nginx_gateway
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - analyzer

  # 🛡️ АВТОНОМНЫЙ КОНТЕЙНЕР БЭКАПОВ (ИНКРЕМЕНТАЛЬНЫЕ ПАЗЛЫ)
  backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: crm_backup_service
    restart: always
    user: "postgres:postgres"
    volumes:
      - ./infra/backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=crm_main_database
      - POSTGRES_USER=crm_admin
      - POSTGRES_PASSWORD=crm_secure_password
      - POSTGRES_EXTRA_OPTS=-Z 9 --schema=public # Максимальный уровень сжатия gzip
      - BACKUP_NUM_KEEP=30                        # Хранить историю за последние 30 дней
      - BACKUP_FREQUENCY=daily                    # Автозапуск раз в день (резервный триггер)
      - BACKUP_TIME=2355                          # Основной запуск в 23:55 при закрытии дня
    depends_on:
      - db

volumes:
  crm_pg_data: