# docker compose up -d      легкий запуск без хромиума
# docker compose --profile full up -d     полный
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: crm_postgres_db
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_secure_password
      POSTGRES_DB: crm_main_database
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_admin -d crm_main_database"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🚀 ТЯЖЕЛЫЙ БРАУЗЕР: Выделен в профиль "full". 
  # В легком режиме он НЕ скачивается и НЕ тратит ОЗУ.
  browserless:
    image: browserless/chrome:latest
    container_name: crm_browserless
    restart: always
    profiles:
      - full
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - DEMO_MODE=false
      - CONNECTION_TIMEOUT=60000

  backend:
    build: ./services/core
    container_name: crm_backend_core
    restart: always
    volumes:
      - ./services/core:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://crm_admin:crm_secure_password@db:5432/crm_main_database
    depends_on:
      db:
        condition: service_healthy

  logger:
    build: ./services/logger
    container_name: crm_logger_service
    restart: always
    volumes:
      - ./services/logger:/app
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  analyzer:
    build: ./services/analyzer
    container_name: crm_analyzer_service
    restart: always
    volumes:
      - ./services/analyzer:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://crm_admin:crm_secure_password@db:5432/crm_main_database
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 100M

  frontend:
    build: ./frontend
    container_name: crm_frontend_react
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  gateway:
    image: nginx:alpine
    container_name: crm_nginx_gateway
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - analyzer

  # 🔥 БЭКАП: Регламент Живых Пазлов СУБД (Каждые 3 часа)
  backup:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: crm_backup_service
    restart: always
    user: "postgres:postgres"
    volumes:
      - ./infra/backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=crm_main_database
      - POSTGRES_USER=crm_admin
      - POSTGRES_PASSWORD=crm_secure_password
      - POSTGRES_EXTRA_OPTS=-Z 9
      - BACKUP_NUM_KEEP=30
      - BACKUP_FREQUENCY=cron
      - BACKUP_CRON=0 */3 * * *
      - BACKUP_ON_START=TRUE
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: crm_db_manager
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  crm_qa_orchestrator:
    build: ./services/qa_orchestrator
    container_name: crm_qa_orchestrator
    restart: always
    volumes:
      - ./services/qa_orchestrator:/app
    ports:
      - "8005:8005"
    environment:
      - GATEWAY_URL=http://gateway:80
      - DATABASE_URL=postgresql+asyncpg://crm_admin:crm_secure_password@db:5432/crm_main_database
      # 🔥 ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМА: "1" — легкий (без Chromium), "0" — честные клики
      - LIGHTWEIGHT_MODE=1
    depends_on:
      gateway:
        condition: service_started
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  crm_pg_data: