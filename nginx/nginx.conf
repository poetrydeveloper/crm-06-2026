# nginx/nginx.conf
server {
    listen 80;
    server_name localhost;

    # 1. МАРШРУТ НА ГЛАВНЫЙ БЭКЕНД (CORE)
    # Перенаправляет все запросы, начинающиеся с /api/
    location /api/ {
        proxy_pass http://logger:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Автодокументация Swagger UI для бэкенда через шлюз
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # 2. МАРШРУТ НА REACT-ФРОНТЕНД (VITE)
    # Сюда уходят все остальные запросы
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Поддержка WebSockets для Hot Reload в Vite из Windows
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
