server {
    listen 80;
    server_name localhost;

    # 1. Логгер (добавляем слэш в конце прокси, чтобы срезать префикс, если это необходимо вашему логгеру)
    location /api/v1/logs/ {
        proxy_pass http://logger:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. 🔥 ИСПРАВЛЕНО: Объединяем пути аналитики и триггера под один блок
    location ~ ^/api/v1/(analytics|analyzer)/ {
        proxy_pass http://analyzer:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Увеличиваем таймаут, так как расчет аналитики может идти дольше обычного запроса
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # 3. Документация основного бэкенда (добавлены заголовки, иначе стили Swagger могут не грузиться)
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # 4. Основной бэкэнд (общие запросы API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Фронтенд (с поддержкой WebSockets для горячей перезагрузки Vite/Webpack на лету)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
    }
}