# nginx/nginx.conf
server {
    listen 80;
    server_name localhost;

    # 1. МАРШРУТ НА ГЛАВНЫЙ БЭКЕНД (CORE) — СТРОГО НА BACKEND!
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔥 ДОБАВЛЕНО: Маршрут шлюза на микросервис логирования (LOGGER) для Журнала Брака
    location /api/v1/logs/ {
        proxy_pass http://logger:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔥 ДОБАВЛЕНО: Маршрут шлюза на микросервис аналитики (ANALYTICS) для Дашбордов Выручки
    location /api/v1/analytics/ {
        proxy_pass http://analyzer:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Автодокументация Swagger UI для бэкенда через шлюз
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # 2. МАРШРУТ НА REACT-ФРОНТЕНД (VITE)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Поддержка WebSockets для Hot Reload в Vite из Windows
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
